
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ff9ebb; /* Fondo rosa idéntico */
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 30px 30px, 60px 60px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Tarjeta translúcida central */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 45px 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 10;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.2);
            color: #ffffff;
        }

        /* Subtítulo superior */
        .subtitulo {
            font-size: 1.2rem;
            margin-bottom: 25px;
            opacity: 0.95;
            font-weight: 500;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.15);
        }

        /* Frase principal de Amor y Amistad */
        .descripcion {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            font-style: italic;
        }

        .dedicatoria {
            font-size: 1.1rem;
            margin-bottom: 35px;
            font-weight: bold;
        }

        /* Botón "Presióname" */
        .btn-spotify {
            background-color: #ffffff;
            color: #ff4d6d;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-spotify:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Lluvia de palabras y elementos flotantes */
        .palabra-flotante {
            position: absolute;
            top: -60px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(217, 4, 41, 0.3), -1px -1px 0 rgba(255,255,255,0.4);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            animation: caer linear infinite;
        }

        @keyframes caer {
            0% {
                transform: translateY(0) scale(0.8) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(108vh) scale(1.1) rotate(15deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="subtitulo">✨ El regalo más bonito de la vida ✨</div>
        
        <div class="descripcion">
            "La verdadera amistad y el amor sincero no se buscan, se encuentran en las personas que, como tú, hacen que el mundo sea un lugar mucho más hermoso." 💖
        </div>
        
        <div class="dedicatoria">
            ¡Gracias por cruzarte en mi camino! 🌹💫
        </div>

        <!-- Botón que abre tu canción de Spotify -->
        <a href="https://open.spotify.com/track/3qAJAUr7yc9bPDx4ESt6ND?si=ifrTeOnVSCKFI113tWbkbw&utm_source=copy-link" target="_blank" class="btn-spotify">
            💝 Presióname 💝
        </a>
    </div>

    <script>
        // Tu lista de palabras especiales que van a caer
        const palabras = [
            "Mi niña ❤️", "Mi princesita 👑", "Mi hermosa 🌹", "Mi bonita 🌸",
            "Mi reina 👑", "Mi vida 💖", "Mi cielo ☁️", "Mi luz ✨",
            "Mi personita 🫶", "Mi consentida 💕", "Mi angelito 😇", "Mi tesoro 💎",
            "Mi estrella ⭐", "Mi sol ☀️", "Mi muñequita 🧸", "Mi flor 🌺"
        ];

        function crearPalabra() {
            const elemento = document.createElement('div');
            elemento.classList.add('palabra-flotante');
            
            // Mezclamos un poco agregando corazones y destellos flotantes sueltos
            const probabilidadDecoracion = Math.random();
            if (probabilidadDecoracion > 0.8) {
                elemento.innerText = "💖";
            } else if (probabilidadDecoracion > 0.6) {
                elemento.innerText = "✨";
            } else {
                elemento.innerText = palabras[Math.floor(Math.random() * palabras.length)];
            }
            
            // Posición horizontal aleatoria
            elemento.style.left = Math.random() * 90 + "vw"; 
            
            // Velocidad de caída fluida (entre 5 y 9 segundos)
            const duracion = Math.random() * 4 + 5;
            elemento.style.animationDuration = duracion + "s";
            
            // Tamaños variados para dar profundidad
            elemento.style.fontSize = (Math.random() * 0.5 + 1.1) + "rem";

            document.body.appendChild(elemento);

            // Eliminar elemento al terminar la animación
            setTimeout(() => {
                elemento.remove();
            }, duracion * 1000);
        }

        // Genera una nueva palabra o detalle cada 450 milisegundos
        setInterval(crearPalabra, 450);
    </script>
</body>
</html>

```
