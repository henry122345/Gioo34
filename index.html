<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amistad y Amor ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ff9ebb; /* Fondo rosa idéntico */
            background-image: radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
            background-size: 30px 30px; /* Simula los puntitos brillantes de fondo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Tarjeta translúcida central */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 10;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.15);
            color: #ffffff;
        }

        /* Título Principal */
        .titulo {
            font-size: 2.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.15);
        }

        /* Subtítulos y textos adaptados de tu imagen */
        .subtitulo {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .descripcion {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.95;
        }

        .dedicatoria {
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Botón idéntico de la imagen */
        .btn-spotify {
            background-color: #ffffff;
            color: #ff4d6d;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-spotify:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* Lluvia de palabras personalizada */
        .palabra-flotante {
            position: absolute;
            top: -60px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(217, 4, 41, 0.4), -1px -1px 0 rgba(255,255,255,0.5);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            animation: caer linear infinite;
        }

        @keyframes caer {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.85;
            }
            90% {
                opacity: 0.85;
            }
            100% {
                transform: translateY(108vh) scale(1.1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="titulo">❤️ Amistad y Amor ❤️</div>
        <div class="subtitulo">❤️ Gracias por formar parte de mi vida.</div>
        
        <div class="descripcion">
            La amistad y el amor son los sentimientos más hermosos cuando nacen desde el corazón. 💖
        </div>
        
        <div class="dedicatoria">
            Siempre tendrás un lugar especial en mi corazón. 🌹✨
        </div>

        <!-- Botón que abre tu canción de Spotify -->
        <a href="https://open.spotify.com/track/3qAJAUr7yc9bPDx4ESt6ND?si=ifrTeOnVSCKFI113tWbkbw&utm_source=copy-link" target="_blank" class="btn-spotify">
            💝 Presióname 💝
        </a>
    </div>

    <script>
        // Tu lista de palabras especiales
        const palabras = [
            "Mi niña ❤️", "Mi princesita 👑", "Mi hermosa 🌹", "Mi bonita 🌸",
            "Mi reina 👑", "Mi vida 💖", "Mi cielo ☁️", "Mi luz ✨",
            "Mi personita 🫶", "Mi consentida 💕", "Mi angelito 😇", "Mi tesoro 💎",
            "Mi estrella ⭐", "Mi sol ☀️", "Mi muñequita 🧸", "Mi flor 🌺"
        ];

        function crearPalabra() {
            const elemento = document.createElement('div');
            elemento.classList.add('palabra-flotante');
            
            // Selección aleatoria
            elemento.innerText = palabras[Math.floor(Math.random() * palabras.length)];
            
            // Posición en la pantalla
            elemento.style.left = Math.random() * 90 + "vw"; 
            
            // Velocidad fluida de caída (entre 5 y 9 segundos)
            const duracion = Math.random() * 4 + 5;
            elemento.style.animationDuration = duracion + "s";
            
            // Tamaños variados como en la imagen
            elemento.style.fontSize = (Math.random() * 0.5 + 1.1) + "rem";
            
            // Transparencia aleatoria suave
            elemento.style.opacity = Math.random() * 0.3 + 0.6;

            document.body.appendChild(elemento);

            // Limpieza de memoria
            setTimeout(() => {
                elemento.remove();
            }, duracion * 1000);
        }

        // Genera una frase flotante constantemente
        setInterval(crearPalabra, 500);
    </script>
</body>
</html>

```
