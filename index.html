<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Gran Amiga 💕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor principal */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(235, 94, 138, 0.2);
            text-align: center;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            color: #d90429;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        /* Estilo del reproductor de Spotify */
        .spotify-player {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Efecto de las palabras cayendo */
        .palabra-flotante {
            position: absolute;
            top: -50px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ef476f;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            animation: caer linear infinite;
        }

        @keyframes caer {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(20deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para una amiga muy especial 🫶</h1>
        <p>Una melodía y mil formas de decirte lo mucho que vales.</p>
        
        <!-- Reproductor de Spotify con tu canción -->
        <div class="spotify-player">
            <iframe style="border-radius:12px" 
                src="https://open.spotify.com/embed/track/3qAJAUr7yc9bPDx4ESt6ND?utm_source=generator" 
                width="100%" 
                height="352" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>
    </div>

    <script>
        // Tu lista exacta de palabras y emojis
        const palabras = [
            "Mi niña ❤️", "Mi princesita 👑", "Mi hermosa 🌹", "Mi bonita 🌸",
            "Mi reina 👑", "Mi vida 💖", "Mi cielo ☁️", "Mi luz ✨",
            "Mi personita 🫶", "Mi consentida 💕", "Mi angelito 😇", "Mi tesoro 💎",
            "Mi estrella ⭐", "Mi sol ☀️", "Mi muñequita 🧸", "Mi flor 🌺"
        ];

        function crearPalabraFlotante() {
            const elemento = document.createElement('div');
            elemento.classList.add('palabra-flotante');
            
            // Elige una palabra al azar de tu lista
            elemento.innerText = palabras[Math.floor(Math.random() * palabras.length)];
            
            // Posición horizontal aleatoria
            elemento.style.left = Math.random() * 100 + "vw";
            
            // Duración de la caída aleatoria para que no caigan todas al mismo tiempo (entre 4 y 8 segundos)
            const duracion = Math.random() * 4 + 4;
            elemento.style.animationDuration = duracion + "s";
            
            // Tamaños ligeramente variados para dar dinamismo
            elemento.style.fontSize = (Math.random() * 0.4 + 0.9) + "rem";

            document.body.appendChild(elemento);

            // Elimina el elemento cuando termina de caer para no saturar el navegador
            setTimeout(() => {
                elemento.remove();
            }, duracion * 1000);
        }

        // Genera una nueva palabra cada 600 milisegundos
        setInterval(crearPalabraFlotante, 600);
    </script>
</body>
</html>
