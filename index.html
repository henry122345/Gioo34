<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Ti, Mi Niña ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #0d0d1a, #1a0826, #2d0b3f);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      color: #fff;
      padding: 20px;
    }

    /* Contenedor principal */
    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 30px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
      animation: fadeIn 1.5s ease-in-out;
    }

    .card h1 {
      font-size: 1.8rem;
      color: #ff758c;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .card p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e0e0e0;
      margin-bottom: 25px;
      font-style: italic;
    }

    /* Reproductor de Spotify */
    .spotify-container {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    iframe {
      border: none;
      width: 100%;
      height: 152px;
    }

    /* Animación de corazones flotantes */
    .heart {
      position: absolute;
      bottom: -10vh;
      color: #ff4b2b;
      font-size: 20px;
      animation: float 6s infinite linear;
      opacity: 0.7;
      z-index: 1;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg) scale(1.3);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Especialmente Para Ti ❤️</h1>
    <p>
      "Esta canción me recuerda a lo lindo que es coincidir contigo. Seguiré luchando cada día por tu amor y por ganarme ese lugar especial en tu corazón, mi niña."
    </p>

    <!-- Reproductor incrustado de la canción -->
    <div class="spotify-container">
      <iframe 
        src="https://open.spotify.com/embed/track/3oJhbB8LrDTCNj35lwdtxf?utm_source=generator&theme=0" 
        allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
      </iframe>
    </div>
  </div>

  <!-- Script para generar los corazones de fondo -->
  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 3 + 4 + 's';
      heart.style.fontSize = Math.random() * 15 + 15 + 'px';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 350);
  </script>

</body>
</html>
